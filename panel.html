:root[data-theme="uzay"] body{
  background-color: var(--page);
  background-image:
    radial-gradient(ellipse 900px 550px at 12% -8%,  rgba(139,124,240,.14), transparent 60%),
    radial-gradient(ellipse 800px 550px at 108% 15%, rgba(53,215,232,.09),  transparent 60%),
    radial-gradient(1px 1px at 20px 30px,   rgba(255,255,255,.85), transparent),
    radial-gradient(1px 1px at 140px 90px,  rgba(255,255,255,.55), transparent),
    radial-gradient(1.5px 1.5px at 95px 165px, rgba(195,182,255,.8), transparent),
    radial-gradient(1px 1px at 210px 40px,  rgba(255,255,255,.4), transparent),
    radial-gradient(2px 2px at 250px 120px, rgba(53,215,232,.5),  transparent),
    radial-gradient(1px 1px at 320px 200px, rgba(255,255,255,.7), transparent),
    radial-gradient(1px 1px at 60px 230px,  rgba(255,255,255,.35), transparent);
  background-repeat: no-repeat, no-repeat, repeat, repeat, repeat, repeat, repeat, repeat, repeat;
  background-size: auto, auto, 340px 260px, 340px 260px, 340px 260px, 220px 300px, 220px 300px, 220px 300px, 400px 400px;
  background-attachment: fixed;
}
:root{--radius:12px; --radius-sm:8px; --radius-pill:999px;}
/* Obsidyen + Matris: minimalist, tamamen köşeli */
:root[data-theme="obsidyen"], :root[data-theme="matris"]{--radius:0; --radius-sm:0; --radius-pill:0;}
:root[data-theme="obsidyen"] .kart-baslik, :root[data-theme="matris"] .kart-baslik{background:var(--surface);}
:root[data-theme="obsidyen"] .kart-baslik::before, :root[data-theme="matris"] .kart-baslik::before{display:none;}
:root[data-theme="obsidyen"] .yigin-serit:hover, :root[data-theme="matris"] .yigin-serit:hover{background:var(--surface);}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--page);color:var(--ink);font-family:var(--font,system-ui,-apple-system,"Segoe UI",sans-serif);font-size:16px;line-height:1.45;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{margin:0;}
.muted{color:var(--muted);}
.num{font-variant-numeric:tabular-nums;}
.wrap{max-width:1680px;margin:0 auto;padding:0 20px 24px;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

header{position:sticky;top:0;z-index:20;background:var(--surface);border-bottom:1px solid var(--line);}
.header-inner{max-width:1680px;margin:0 auto;padding:7px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.header-inner h1{font-size:16px;font-weight:800;letter-spacing:-.01em;}
.header-sag{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--ink-2);}

.tema-kutu{position:relative;}
.tema-nokta{width:14px;height:14px;border-radius:50%;display:inline-block;flex:none;border:1px solid var(--border);}
.tema-panel{position:absolute;right:0;top:calc(100% + 8px);min-width:300px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;display:grid;grid-template-columns:repeat(2,minmax(135px,1fr));gap:6px;box-shadow:0 12px 32px rgba(0,0,0,.35);z-index:30;}
.tema-panel[hidden]{display:none;}
.tema-sec{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid transparent;background:transparent;color:var(--ink);font-size:13px;font-weight:600;cursor:pointer;text-align:left;}
.tema-sec:hover{background:rgba(var(--accent-rgb),.10);}
.tema-sec.aktif{border-color:var(--accent);background:rgba(var(--accent-rgb),.08);}

.pil{display:inline-flex;align-items:center;padding:3px 10px;border-radius:var(--radius-pill);font-size:12px;font-weight:700;border:1px solid var(--border);background:var(--page);color:var(--ink);}
.pil-good{background:rgba(var(--good-rgb),.16);}
.pil-warning{background:rgba(var(--warning-rgb),.20);}
.pil-critical{background:rgba(var(--critical-rgb),.16);}
.pil-accent{background:rgba(var(--accent-rgb),.16);}
.pil-nabiz{animation:nabiz 1.4s ease-in-out infinite;}
@keyframes nabiz{0%,100%{opacity:1}50%{opacity:.55}}
@media (prefers-reduced-motion: reduce){.pil-nabiz{animation:none;}}
#baglantiPil{padding:3px 10px;border-radius:var(--radius-pill);background:rgba(var(--critical-rgb),.16);color:var(--ink);font-size:12px;font-weight:700;}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);background:var(--accent);color:#fff;text-decoration:none;font-size:14px;font-weight:700;border:1px solid transparent;cursor:pointer;}
.btn.ghost{background:transparent;color:var(--ink);border-color:var(--border);}
.btn.sm{padding:4px 10px;font-size:12px;font-weight:600;}

.git-serit-sarici{position:sticky;top:41px;z-index:15;background:var(--page);border-bottom:1px solid var(--line);}
.git-serit{max-width:1680px;margin:0 auto;padding:5px 20px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:thin;scrollbar-color:var(--line) transparent;}
.git-pil{flex:none;padding:2px 8px;border-radius:var(--radius-pill);border:1px solid var(--border);background:var(--surface);color:var(--ink-2);font-size:11px;font-weight:700;cursor:pointer;font-variant-numeric:tabular-nums;}
.git-pil:hover{border-color:var(--accent);color:var(--ink);}
.git-pil-warning{border-color:rgba(var(--warning-rgb),.55);}
.git-pil-critical{border-color:rgba(var(--critical-rgb),.6);color:var(--critical);}
.git-pil[hidden]{display:none;}

.banner{margin-top:10px;padding:8px 12px;border-radius:var(--radius-sm);background:rgba(var(--serious-rgb),.14);border:1px solid rgba(var(--serious-rgb),.4);font-size:12px;color:var(--ink);}
.banner > div + div{margin-top:2px;}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:8px;margin-top:10px;}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:7px 12px;}
.tile-etiket{font-size:11px;color:var(--muted);margin-bottom:1px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tile-deger{font-size:19px;font-weight:800;line-height:1.15;letter-spacing:-.01em;}
.tile-alt{font-size:10px;color:var(--muted);margin-top:2px;}
.meter{margin-top:5px;}
.meter-track{height:5px;border-radius:var(--radius-pill);background:var(--accent-100);overflow:hidden;}
.meter-track.meter-warning{background:rgba(var(--warning-rgb),.2);}
.meter-track.meter-critical{background:rgba(var(--critical-rgb),.2);}
.meter-fill{height:100%;border-radius:var(--radius-pill);background:var(--accent);}
.meter-fill.meter-warning{background:var(--warning);}
.meter-fill.meter-critical{background:var(--critical);}

.sys-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-top:10px;padding:0 14px;}
.sys-card summary{cursor:pointer;padding:8px 0;font-weight:700;font-size:13px;list-style:none;}
.sys-card summary::-webkit-details-marker{display:none;}
.sys-card summary::before{content:'▸ ';color:var(--muted);}
.sys-card[open] summary::before{content:'▾ ';}
.sys-detay{padding:4px 0 18px;}
.sys-satir{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px;}
.sys-detay h4{font-size:12px;text-transform:uppercase;color:var(--muted);margin:18px 0 8px;letter-spacing:.04em;}
.log-kutu{background:var(--page);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow:auto;color:var(--ink-2);}
.ozet-linkler{display:flex;flex-wrap:wrap;gap:6px;}

.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:10px 0 10px;}
.arama{flex:1;min-width:170px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);font-size:13px;color:var(--ink);}
.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--radius-pill);border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;color:var(--ink-2);cursor:pointer;}
.chip-aktif{background:rgba(var(--accent-rgb),.16);border-color:var(--accent);color:var(--ink);}
.chip-sayi{color:var(--muted);font-variant-numeric:tabular-nums;}
.chip-aktif .chip-sayi{color:var(--accent);}

.badge{display:inline-flex;align-items:center;gap:6px;padding:2px 9px;border-radius:var(--radius-pill);border:1px solid var(--border);font-size:12px;font-weight:700;color:var(--ink);background:var(--surface);white-space:nowrap;}
.badge .dot{width:8px;height:8px;border-radius:50%;flex:none;}
.badge-good{background:rgba(var(--good-rgb),.16);} .badge-good .dot{background:var(--good);}
.badge-warning{background:rgba(var(--warning-rgb),.2);} .badge-warning .dot{background:var(--warning);}
.badge-serious{background:rgba(var(--serious-rgb),.2);} .badge-serious .dot{background:var(--serious);}
.badge-critical{background:rgba(var(--critical-rgb),.16);} .badge-critical .dot{background:var(--critical);}

/* ── Obsidian tarzı kayan yığılmış sekmeler (sliding panes) ──────────────────
   Her sipariş her zaman tam bir panel. Paneller mutlak konumlanır; kaydırma
   aralığını #yiginSpacer sağlar. JS (yiginKaydir) her scroll karesinde panel
   konumlarını hesaplar: iki kenarda en fazla K şerit yuvası, arada açık
   panolar; kaydırdıkça pano şeridi kenar yuvasına kayar, sıradaki pano
   yuvadan dışarı kendiliğinden açılır. Şerit genişliği JS'teki SERIT_W ile
   eşleşmeli. */
.yigin{display:block;position:relative;overflow-x:auto;overflow-y:hidden;height:max(480px, calc(100vh - 235px));margin-top:0;border:1px solid var(--border);border-radius:var(--radius);background:var(--page);scrollbar-width:thin;scrollbar-color:var(--line) transparent;}
.yigin::-webkit-scrollbar{height:10px;}
.yigin::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px;}
#yiginSpacer{height:1px;}
.yigin-sekme{display:flex;align-items:stretch;position:absolute;top:0;bottom:0;width:min(452px,88vw);background:var(--surface);border-left:1px solid var(--line);box-shadow:-6px 0 12px rgba(0,0,0,.18);}
.yigin-sekme[hidden]{display:none;}
.yigin-serit{flex:none;width:36px;display:flex;flex-direction:column;align-items:center;gap:8px;padding:10px 0;background:var(--surface);border:none;border-right:1px solid var(--line);cursor:pointer;user-select:none;color:inherit;font-family:inherit;}
.yigin-serit:hover{background:rgba(var(--accent-rgb),.12);}
.serit-nokta{width:8px;height:8px;border-radius:50%;flex:none;background:var(--muted);}
.nokta-good{background:var(--good);} .nokta-warning{background:var(--warning);} .nokta-critical{background:var(--critical);}
.serit-no{writing-mode:vertical-rl;font-size:13px;font-weight:800;letter-spacing:.1em;color:var(--tx-1);white-space:nowrap;}
.serit-ilerleme{writing-mode:vertical-rl;font-size:10px;font-weight:700;color:var(--muted);margin-top:auto;}
.yigin-sekme.kart-tamam .serit-ilerleme{color:var(--good);}
.yigin-panel{flex:1;min-width:0;background:var(--surface);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--line) transparent;}
.yigin-panel::-webkit-scrollbar{width:8px;}
.yigin-panel::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px;}
.yigin-bos{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:15px;}
.yigin-bos[hidden]{display:none;}
.kart-baslik{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:9px 14px;background:linear-gradient(180deg, rgba(var(--accent-rgb),.12), rgba(var(--accent-rgb),.02)),var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:1;}
.kart-baslik::before{content:'';position:absolute;top:0;left:14px;right:14px;height:3px;background:var(--accent);border-radius:0 0 3px 3px;opacity:.65;}
.kart-tamam .kart-baslik::before{background:var(--good);opacity:1;}
.kart-no{font-size:18px;font-weight:800;color:var(--tx-1);letter-spacing:-.01em;}
.kart-parca-sayisi{font-size:12px;}
.kart-baslik-sag{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.kart-link{font-size:12px;font-weight:700;color:var(--accent);text-decoration:none;padding:3px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);}

.kart-govde{padding:2px 14px;}
.kart-durum-mesaj{padding:14px 0;font-size:14px;}

.parca-satir:last-of-type{border-bottom:none;}
.parca-satir.ucuyor{opacity:.5;}
.parca-simge{width:24px;height:24px;border-radius:var(--radius-sm);background:var(--page);display:flex;align-items:center;justify-content:center;flex:none;color:var(--muted);font-size:13px;}
.parca-ad{flex:1;font-size:14px;color:var(--ink);min-width:0;}

.kart-tumunu{width:100%;margin:8px 0 12px;padding:8px;border-radius:var(--radius-sm);border:1px dashed var(--border);background:transparent;color:var(--ink-2);font-size:12px;font-weight:700;cursor:pointer;}

footer.altbilgi{text-align:center;color:var(--muted);font-size:11px;padding:12px 0 20px;}

<script>
'use strict';

/* pdf_uret.py ile birebir aynı satır sırası ve gram eşlemesi */
const ROWS = [
  ["Frenli Menteşe","Frenli Menteşe"],["Frensiz Menteşe","Frensiz Menteşe"],
  ["Menteşe Tabanı","Menteşe Tabanı"],["Modül Bağlantı","Modülleri Birbirine Bağlama"],
  ["Raf Pimi","Raf Pimi"],["Linco Gövde","Linco Gövde"],["Linco Kapak","Linco Kapak"],
  ["Linco Dübel","Linco Dübel"],["Minifix","Minifix"],["Uzun Linco Pimi","Uzun Linco Pimi"],
  ["Ayarlı Ayak","Ayarlı Ayak"],["Allen","Allen"],["Tıpa","Tıpa"],["Kulp","Kulp"],
  ["Kulp Vidası","Kulp Vidası"],["L Bağlantı Seti","L Bağlantı Seti"],
  ["Askılık Flanşı","Askılık Flanşı"],["Askılık Borusu","Askılık Borusu"],
  ["Ağaç Vidası","Ağaç Vidası"],["Arkalık Çivisi","Arkalık Çivisi"],
];
const RAY_INSERT_AFTER = "L Bağlantı Seti";
const GRAM_KEY = {
  "Raf Pimi":"Raf Pimi", "Ağaç Vidası":"Ağaç Vidası", "Minifix":"Minifix",
  "Linco Dübel":"Linco Dübel", "Linco Gövde":"Linco", "Linco Kapak":"Linco Kapak",
  "Arkalık Çivisi":"Çivi",
};
const PARCA_GORSEL = {}; /* ileride: {"Kulp":"/gorseller/kulp.png", ...} — şimdilik boş */
const VARSAYILAN_SIMGE = '◇';
const DURUM_META = {
  islendi:{sinif:'good', etiket:'İşlendi'},
  bekliyor:{sinif:'warning', etiket:'Bekliyor'},
  isleniyor:{sinif:'warning', etiket:'İşleniyor'},
  hatali:{sinif:'critical', etiket:'Hatalı'},
};

let lastData = null;
let filtre = 'tumu';
let arama = '';
let siralamaYonu = 'azalan';  /* sunucu azalan gönderir (en büyük no en başta) */
const checklistMap = {};   /* no -> {parca: iso|null} — sunucudan sürekli beslenen yerel önbellek */
const ucusta = new Set();  /* "no|parca" — yalnızca POST uçuştayken geçersiz kılma sinyali */
const kartNodeMap = new Map();
const stripNodeMap = new Map();

function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtSayi(v){
  if (v===null || v===undefined) return '';
  if (typeof v === 'number' && v === 0) return '';
  if (typeof v === 'number' && Number.isInteger(v)) return String(v);
  if (typeof v === 'number') return String(v).replace('.',',');
  return String(v);
}
function hucreDeger(adet, gram, key){
  const s = fmtSayi(adet[key]);
  if (s === '') return '';
  if (GRAM_KEY[key]){
    const g = gram[GRAM_KEY[key]];
    if (g !== null && g !== undefined) return s + ' / ' + fmtSayi(g);
  }
  return s;
}
function zamanStr(epoch){
  if (!epoch) return '—';
  return new Date(epoch*1000).toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function isoStr(iso){
  if (!iso) return '';
  return new Date(iso).toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function sonrakiTurStr(epoch){
  const simdi = Date.now()/1000;
  const farkDk = Math.round((epoch-simdi)/60);
  const saat = new Date(epoch*1000).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  if (farkDk <= 0) return 'Sonraki tur: şimdi ('+saat+')';
  return 'Sonraki tur: '+saat+' ('+farkDk+' dk)';
}

let toastTimer = null;
function goster(mesaj){
  const el = document.getElementById('toast');
  el.textContent = mesaj;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 3000);
}

async function veriCek(url, secenek){
  const r = await fetch(url, secenek);
  if (!r.ok){
    const j = await r.json().catch(()=>({}));
    throw new Error(j.hata || ('HTTP '+r.status));
  }
  return r.json();
}
function baglantiDurumu(bagli){
  const pil = document.getElementById('baglantiPil');
  if (bagli){ pil.hidden = true; }
  else { pil.textContent = 'Bağlantı yok — son veri gösteriliyor'; pil.hidden = false; }
}

/* ---------------- tema ---------------- */
/* [anahtar, görünen ad, koyu swatch rengi, vurgu swatch rengi] */
const TEMALAR = [
  ['uzay','Uzay','#06060d','#8b7cf0'],
  ['obsidyen','Obsidyen','#232634','#11b7c5'],
  ['nord','Nord','#2e3440','#88c0d0'],
  ['karbon','Karbon','#17181a','#4c94ec'],
  ['okyanus','Okyanus','#07191c','#36b8c5'],
  ['gece','Gece','#14141f','#9d7bf0'],
  ['rose','Gül Kurusu','#191724','#ebbcba'],
  ['kahve','Kahve','#1d2021','#fabd2f'],
  ['orman','Orman','#0e1810','#66c26e'],
  ['gunbatimi','Gün Batımı','#1c1214','#ff8a5c'],
  ['matris','Matris','#050a06','#37e057'],
  ['acik','Açık','#f9f9f7','#2a78d6'],
  ['kum','Kum','#fdf6e3','#268bd2'],
];
const ACIK_TEMALAR = new Set(['acik','kum']);
function temaSwatch(t){ return 'background:linear-gradient(135deg,'+t[2]+' 50%,'+t[3]+' 50%)'; }
function temaUygula(key){
  const t = TEMALAR.find(x => x[0]===key) || TEMALAR[0];
  key = t[0];
  document.documentElement.setAttribute('data-theme', key);
  const meta = document.querySelector('meta[name=color-scheme]');
  if (meta) meta.setAttribute('content', ACIK_TEMALAR.has(key) ? 'light' : 'dark');
  try{ localStorage.setItem('adaptx_tema', key); }catch(e){}
  document.getElementById('temaAd').textContent = t[1];
  document.getElementById('temaNokta').style.cssText = temaSwatch(t);
  document.querySelectorAll('#temaPanel .tema-sec').forEach(b => b.classList.toggle('aktif', b.dataset.tema===key));
}
function temaPanelKur(){
  document.getElementById('temaPanel').innerHTML = TEMALAR.map(t =>
    '<button class="tema-sec" data-tema="'+t[0]+'" type="button"><span class="tema-nokta" style="'+temaSwatch(t)+'"></span>'+t[1]+'</button>'
  ).join('');
}
function temaPanelAc(ac){
  document.getElementById('temaPanel').hidden = !ac;
  document.getElementById('temaBtn').setAttribute('aria-expanded', String(ac));
}
function temaBaslat(){
  temaPanelKur();
  let key = 'uzay';
  try{ key = localStorage.getItem('adaptx_tema') || 'uzay'; }catch(e){}
  temaUygula(key);
}

/* ---------------- kayan paneller (sliding panes) ----------------
   Tüm sekmeler her zaman açık birer panel. Kenarlarda en fazla K şerit
   yuvası vardır (ekran genişliğine göre 1-6); kaydırdıkça geçilen panolar
   sol yuvalara, gelecek panolar sağ yuvalara şerit olarak istiflenir,
   aradakiler açık durur. Panel i'nin taban (içerik) konumu:
     taban(i) = i*adim + min(i,K)*SERIT_W        (adim = panelW - SERIT_W)
   Görünür konum = clamp(taban - scrollLeft, solYuva(i), sagYuva(i));
   sapma transform ile uygulanır, böylece kaydırma oranında yavaş yavaş
   açılıp kapanırlar. SERIT_W, CSS'teki .yigin-serit genişliğiyle aynı
   olmalı. */
const SERIT_W = 36;
let yiginNodlar = [];      /* görünür (filtre/aramadan geçen) sekme düğümleri, sırayla */
let yiginPanelW = 452;
let yiginAdim = 452 - SERIT_W;
let yiginK = 6;
function gorunurSekmeler(){
  const sonuc = [];
  for (const node of document.getElementById('yigin').children){
    if (node.classList && node.classList.contains('yigin-sekme') && !node.hidden) sonuc.push(node);
  }
  return sonuc;
}
function yiginTaban(i){
  return i * yiginAdim + Math.min(i, yiginK) * SERIT_W;
}
function yiginYerlesim(){
  const yigin = document.getElementById('yigin');
  yiginNodlar = gorunurSekmeler();
  const n = yiginNodlar.length;
  if (!n){ document.getElementById('yiginSpacer').style.width = '0px'; return; }
  yiginPanelW = yiginNodlar[0].offsetWidth || 452;
  yiginAdim = Math.max(1, yiginPanelW - SERIT_W);
  yiginK = Math.max(1, Math.min(6, Math.floor((yigin.clientWidth - yiginPanelW) / (2 * SERIT_W))));
  yiginNodlar.forEach((node, i) => {
    node.style.left = yiginTaban(i) + 'px';
    node.style.zIndex = i + 1;
  });
  document.getElementById('yiginSpacer').style.width = (yiginTaban(n - 1) + yiginPanelW + SERIT_W) + 'px';
  yiginKaydir();
}
function yiginKaydir(){
  const n = yiginNodlar.length;
  if (!n) return;
  const yigin = document.getElementById('yigin');
  const S = SERIT_W, K = yiginK;
  const vw = yigin.clientWidth, sl = yigin.scrollLeft;
  const cur = sl / yiginAdim;   /* kaydırma konumunun pano indeksi karşılığı (kesirli) */
  for (let i = 0; i < n; i++){
    const dogal = yiginTaban(i) - sl;
    const sol = Math.max(0, Math.min(i - cur + K, K, i)) * S;
    let sag = vw - Math.min(Math.max(K - (i - cur) + 1, 1), K, n - i) * S;
    if (sag < sol) sag = sol;
    const x = Math.max(sol, Math.min(dogal, sag));
    yiginNodlar[i].style.transform = (x === dogal) ? '' : ('translateX(' + (x - dogal) + 'px)');
  }
}
function sekmeyeGit(no){
  const node = document.getElementById('siparis-'+no);
  if (!node || node.hidden) return;
  const i = yiginNodlar.indexOf(node);
  if (i < 0) return;
  document.getElementById('yigin').scrollTo({left: i * yiginAdim, behavior: 'smooth'});
}

/* ---------------- checklist yerel önbellek ---------------- */
function siparisMerge(d){
  for (const r of d.siparisler){
    const hedef = checklistMap[r.no] || (checklistMap[r.no] = {});
    for (const k of Object.keys(hedef)){
      if (!(k in r.checklist)) delete hedef[k];
    }
    for (const [k, v] of Object.entries(r.checklist)){
      if (!ucusta.has(r.no+'|'+k)) hedef[k] = v;
    }
  }
}
function kartTamamToplam(r){
  const veri = checklistMap[r.no];
  if (!veri) return {tamam:r.tamam, toplam:r.toplam};
  const anahtarlar = Object.keys(veri);
  return {tamam: anahtarlar.filter(k=>veri[k]).length, toplam: anahtarlar.length};
}

/* ---------------- genel keyed-diff reconcile ---------------- */
function reconcile(container, items, keyFn, sigFn, createFn, nodeMap, updateFn){
  let onceki = null;
  const gorulen = new Set();
  for (const item of items){
    const key = keyFn(item);
    gorulen.add(key);
    const sig = sigFn(item);
    let node = nodeMap.get(key);
    if (!node){
      node = createFn(item);
      node.dataset.sig = sig;
      nodeMap.set(key, node);
    } else if (node.dataset.sig !== sig){
      if (updateFn){ updateFn(node, item); }
      else { const yeni = createFn(item); node.replaceWith(yeni); nodeMap.set(key, yeni); node = yeni; }
      node.dataset.sig = sig;
    }
    if (onceki === null){ if (container.firstChild !== node) container.insertBefore(node, container.firstChild); }
    else if (onceki.nextSibling !== node){ container.insertBefore(node, onceki.nextSibling); }
    onceki = node;
  }
  for (const [key, node] of Array.from(nodeMap.entries())){
    if (!gorulen.has(key)){ node.remove(); nodeMap.delete(key); }
  }
}

/* ---------------- imza (poll sonrası hangi kartın değiştiğini ucuza tespit) ---------------- */
function checklistImzaParcasi(no){
  const veri = checklistMap[no] || {};
  return Object.keys(veri).sort().map(k=>k+':'+(veri[k]||'')+(ucusta.has(no+'|'+k)?'~':'')).join(',');
}
function dictImza(d){
  return Object.entries(d||{}).filter(([,v])=>v).sort((a,b)=>a[0]<b[0]?-1:1).map(([k,v])=>k+':'+v).join(',');
}
function siparisImza(o){
  return [o.durum, o.pdf?1:0, o.ozet_no??'', dictImza(o.adet), dictImza(o.gram), dictImza(o.ray_setleri), checklistImzaParcasi(o.no)].join('|');
}
function stripImza(o){
  const {tamam,toplam} = kartTamamToplam(o);
  return o.durum+'|'+tamam+'/'+toplam;
}

/* ---------------- kart içerik üretimi ---------------- */
function parcaSatirlari(o){
  const adet = o.adet || {}, gram = o.gram || {}, ray = o.ray_setleri || {};
  const satirlar = [];
  for (const [etiket, anahtar] of ROWS){
    if (!adet[anahtar]) continue;
    satirlar.push({key:anahtar, etiket, deger:hucreDeger(adet,gram,anahtar)});
    if (etiket === RAY_INSERT_AFTER){
      const rayAnahtarlari = Object.keys(ray).filter(k=>ray[k]).sort((a,b)=>parseInt(b,10)-parseInt(a,10));
      for (const k of rayAnahtarlari) satirlar.push({key:'ray:'+k, etiket:'Ray Seti '+k, deger:fmtSayi(ray[k])});
    }
  }
  return satirlar;
}
function parcaSatirHtml(no, s){
  const veri = checklistMap[no] || {};
  const zaman = veri[s.key];
  const ucuyorMu = ucusta.has(no+'|'+s.key);
  const id = 'chk-'+no+'-'+s.key.replace(/[^a-zA-Z0-9]/g,'_');
  const simge = PARCA_GORSEL[s.etiket] || VARSAYILAN_SIMGE;
  return '<label class="parca-satir'+(ucuyorMu?' ucuyor':'')+'" for="'+id+'">'
    + '<span class="parca-simge" aria-hidden="true">'+simge+'</span>'
    + '<span class="parca-ad">'+esc(s.etiket)+'</span>'
    + '<span class="parca-miktar num">'+esc(s.deger)+'</span>'
    + '<span class="parca-zaman muted">'+(zaman?isoStr(zaman):'')+'</span>'
    + '<input type="checkbox" id="'+id+'" '+(zaman?'checked':'')+' data-no="'+esc(no)+'" data-parca="'+esc(s.key)+'">'
    + '</label>';
}
function ilerlemeHtml(tamam, toplam){
  if (toplam === 0) return '<span class="muted">—</span>';
  const yuzde = Math.round(tamam*100/toplam);
  return '<span class="ilerleme-metin num">'+tamam+'/'+toplam+'</span>'
    + '<span class="ilerleme-bar"><span class="ilerleme-dolum" style="width:'+yuzde+'%"></span></span>';
}
function kartBaslikHtml(o, tamam, toplam){
  const m = DURUM_META[o.durum] || {sinif:'', etiket:o.durum};
  const pdfBtn = o.pdf
    ? '<a class="kart-link" href="/pdf/siparis/'+encodeURIComponent(o.no)+'" target="_blank" rel="noopener">PDF</a>'
    : (o.durum==='islendi' ? '<span class="badge badge-serious"><span class="dot"></span>PDF yok</span>' : '');
  const ozetBtn = o.ozet_no
    ? '<a class="kart-link" href="/pdf/ozet/'+o.ozet_no+'" target="_blank" rel="noopener">Özet '+o.ozet_no+'</a>' : '';
  const parcaBilgi = o.parca ? '<span class="kart-parca-sayisi muted">'+o.parca+' parça</span>' : '';
  return '<span class="kart-no">'+esc(o.no)+'</span>'+parcaBilgi
    + '<span class="badge badge-'+m.sinif+'"><span class="dot"></span>'+esc(m.etiket)+'</span>'
    + '<span class="kart-baslik-sag">'+ilerlemeHtml(tamam,toplam)+pdfBtn+ozetBtn+'</span>';
}
function kartGovdeHtml(o){
  if (o.durum !== 'islendi'){
    const mesajlar = {
      bekliyor:'Bu sipariş henüz işlenmedi; bir sonraki turda Blender tarafından sayılacak.',
      isleniyor:'Bu sipariş şu anda işleniyor olabilir. Birazdan tekrar kontrol edin.',
      hatali:'Bu siparişin JSON dosyası boş veya bozuk görünüyor. Elle kontrol gerekebilir.',
    };
    return '<p class="kart-durum-mesaj muted">'+esc(mesajlar[o.durum] || 'Durum bilinmiyor.')+'</p>';
  }
  const satirlar = parcaSatirlari(o);
  if (satirlar.length === 0) return '<p class="kart-durum-mesaj muted">Bu siparişte işaretlenecek parça yok.</p>';
  const veri = checklistMap[o.no] || {};
  const kalanVar = satirlar.some(s => !veri[s.key]);
  return satirlar.map(s => parcaSatirHtml(o.no, s)).join('')
    + (kalanVar ? '<button class="kart-tumunu" type="button" data-no="'+esc(o.no)+'">Tümünü işaretle</button>' : '');
}
function kartIcerikHtml(o){
  const {tamam, toplam} = kartTamamToplam(o);
  const m = DURUM_META[o.durum] || {sinif:'', etiket:o.durum};
  return '<button class="yigin-serit" type="button" data-git-sekme="'+esc(o.no)+'" title="'+esc(o.no)+' — '+esc(m.etiket)+'">'
    + '<span class="serit-nokta nokta-'+m.sinif+'" aria-hidden="true"></span>'
    + '<span class="serit-no num">'+esc(o.no)+'</span>'
    + (toplam>0 ? '<span class="serit-ilerleme num">'+tamam+'/'+toplam+'</span>' : '')
    + '</button>'
    + '<div class="yigin-panel"><header class="kart-baslik">'+kartBaslikHtml(o,tamam,toplam)+'</header><div class="kart-govde">'+kartGovdeHtml(o)+'</div></div>';
}
function kartSinifi(o, toplam, tamam){
  return 'yigin-sekme' + (toplam>0 && tamam===toplam ? ' kart-tamam' : '');
}
function kartOlustur(o){
  const el = document.createElement('article');
  el.id = 'siparis-'+o.no;
  el.innerHTML = kartIcerikHtml(o);
  const {tamam,toplam} = kartTamamToplam(o);
  el.className = kartSinifi(o, toplam, tamam);
  return el;
}
function stripPilSinif(o){
  const m = DURUM_META[o.durum] || {sinif:''};
  return 'git-pil git-pil-'+m.sinif;
}
function stripPilBaslik(o){
  const {tamam,toplam} = kartTamamToplam(o);
  const m = DURUM_META[o.durum] || {etiket:o.durum};
  return o.no+' — '+m.etiket+(toplam?' — '+tamam+'/'+toplam:'');
}
function stripPilOlustur(o){
  const b = document.createElement('button');
  b.type = 'button';
  b.className = stripPilSinif(o);
  b.dataset.git = o.no;
  b.title = stripPilBaslik(o);
  b.textContent = o.no;
  return b;
}

/* ---------------- üst bölümler ---------------- */
function cizBaslik(sistem){
  const pil = document.getElementById('durumPil');
  if (sistem.servis_calisiyor){ pil.className='pil pil-accent pil-nabiz'; pil.textContent='Tur çalışıyor…'; }
  else if (!sistem.timer_aktif){ pil.className='pil pil-critical'; pil.textContent='Timer kapalı'; }
  else if (sistem.sonraki_tur){ pil.className='pil pil-good'; pil.textContent=sonrakiTurStr(sistem.sonraki_tur); }
  else { pil.className='pil'; pil.textContent='Durum bilinmiyor'; }
}
function cizUyari(d){
  const kutu = document.getElementById('uyariKutu');
  const sistem = d.sistem;
  const parcalar = [];
  if (sistem.no_suz_fbx && sistem.no_suz_fbx.length){
    parcalar.push(sistem.no_suz_fbx.length + ' FBX dosyasında sipariş no okunamadı: ' + sistem.no_suz_fbx.map(esc).join(', '));
  }
  if (d.sayac.hatali > 0){
    parcalar.push(d.sayac.hatali + ' sipariş hatalı durumda (boş/bozuk JSON) — "Hatalı" filtresinden bakın.');
  }
  if (sistem.uyarilar && sistem.uyarilar.length) sistem.uyarilar.forEach(u => parcalar.push(esc(u)));
  if (parcalar.length === 0){ kutu.hidden = true; return; }
  kutu.hidden = false;
  kutu.innerHTML = parcalar.map(p => '<div>⚠ '+p+'</div>').join('');
}
function diskTileHtml(disk){
  if (!disk) return '<div class="tile"><div class="tile-etiket">Disk kullanımı</div><div class="tile-deger muted">Bilinmiyor</div></div>';
  const yuzde = disk.yuzde;
  const sinif = yuzde>=90 ? 'critical' : (yuzde>=80 ? 'warning' : 'accent');
  const bosGb = (disk.bos/1e9).toFixed(1).replace('.',',');
  const topGb = (disk.toplam/1e9).toFixed(1).replace('.',',');
  return '<div class="tile"><div class="tile-etiket">Disk kullanımı</div><div class="tile-deger">%'+yuzde+'</div>'
    + '<div class="meter"><div class="meter-track meter-'+sinif+'"><div class="meter-fill meter-'+sinif+'" style="width:'+yuzde+'%"></div></div></div>'
    + '<div class="tile-alt">'+bosGb+' GB boş / '+topGb+' GB</div></div>';
}
function cizKpi(d){
  const s = d.sayac;
  let isaretli=0, toplamParca=0;
  for (const r of d.siparisler){ const {tamam,toplam} = kartTamamToplam(r); isaretli+=tamam; toplamParca+=toplam; }
  const parcaYuzde = toplamParca>0 ? Math.round(isaretli*100/toplamParca) : 0;
  const tiles = [
    ['Toplam sipariş', s.toplam], ['İşlendi', s.islendi], ['Bekleyen', s.bekleyen+s.isleniyor],
    ['Hatalı', s.hatali], ['Tamamlanan sipariş', s.tamamlanan+' / '+s.toplam], ['Parça toplama', '%'+parcaYuzde],
  ];
  document.getElementById('kpiGrid').innerHTML = tiles.map(([etiket,deger]) =>
    '<div class="tile"><div class="tile-etiket">'+etiket+'</div><div class="tile-deger">'+deger+'</div></div>'
  ).join('') + diskTileHtml(d.sistem.disk);
}
function cizSistemDetay(sistem){
  const el = document.getElementById('sysDetay');
  const loglar = (sistem.son_loglar||[]).map(esc).join('\n') || 'Kayıt yok.';
  const sonTur = sistem.son_tur || {};
  const sonTurEtiket = {tamamlandi:'Tamamlandı', hata:'Hata', atlandi:'Yeni sipariş yok', bilinmiyor:'Bilinmiyor'}[sonTur.sonuc] || esc(sonTur.sonuc || 'Bilinmiyor');
  const rclone = sistem.rclone || {};
  const ozetAdet = sistem.ozet_adet || 0;
  const ozetLinkler = Array.from({length: ozetAdet}, (_,i)=>i+1)
    .map(n => '<a class="btn ghost sm" href="/pdf/ozet/'+n+'" target="_blank" rel="noopener">'+n+'</a>').join('');
  el.innerHTML = '<div class="sys-satir"><span>Son tur</span><span>'+sonTurEtiket+' — '+zamanStr(sonTur.zaman)+'</span></div>'
    + '<div class="sys-satir"><span>rclone son hata</span><span>'+(rclone.son_satir ? esc(rclone.son_satir)+' — '+zamanStr(rclone.err_mtime) : 'Yok')+'</span></div>'
    + '<div class="sys-satir"><span>Son inen FBX</span><span>'+(sistem.son_fbx ? esc(sistem.son_fbx.ad)+' — '+zamanStr(sistem.son_fbx.zaman) : '—')+'</span></div>'
    + '<div class="sys-satir"><span>Sistem yükü</span><span>'+(sistem.yuk ?? '—')+'</span></div>'
    + '<h4>Son günlük satırları</h4><pre class="log-kutu">'+loglar+'</pre>'
    + '<h4>Özet PDF\'ler ('+ozetAdet+')</h4><div class="ozet-linkler">'+(ozetLinkler || '<span class="muted">Henüz yok</span>')+'</div>';
}
function filtreSayilar(d){
  const s = d.sayac;
  let eksik=0, tamam=0;
  for (const r of d.siparisler){
    const {tamam:t, toplam} = kartTamamToplam(r);
    if (toplam>0 && t<toplam) eksik++;
    if (toplam>0 && t===toplam) tamam++;
  }
  return { tumu:s.toplam, bekleyen:s.bekleyen+s.isleniyor, hatali:s.hatali, eksik, tamam };
}
function cizFiltreler(d){
  const sayilar = filtreSayilar(d);
  const tanim = [
    ['tumu','Tümü',sayilar.tumu], ['bekleyen','Bekleyen',sayilar.bekleyen], ['hatali','Hatalı',sayilar.hatali],
    ['eksik','Eksik checklist',sayilar.eksik], ['tamam','Tamamlanan',sayilar.tamam],
  ];
  document.getElementById('filtreBar').innerHTML = tanim.map(([key,etiket,sayi]) =>
    '<button class="chip '+(filtre===key?'chip-aktif':'')+'" data-filtre="'+key+'" type="button">'+etiket+' <span class="chip-sayi">'+sayi+'</span></button>'
  ).join('');
}
function gecer(r){
  if (arama){
    const q = arama.trim().toLocaleLowerCase('tr-TR');
    if (!r.no.toLowerCase().includes(q)) return false;
  }
  if (filtre==='bekleyen') return r.durum==='bekliyor' || r.durum==='isleniyor';
  if (filtre==='hatali') return r.durum==='hatali';
  if (filtre==='eksik'){ const {tamam,toplam}=kartTamamToplam(r); return toplam>0 && tamam<toplam; }
  if (filtre==='tamam'){ const {tamam,toplam}=kartTamamToplam(r); return toplam>0 && tamam===toplam; }
  return true;
}
function gorunurlukUygula(liste){
  for (const r of liste){
    const gizli = !gecer(r);
    const kart = kartNodeMap.get(r.no); if (kart) kart.hidden = gizli;
    const pil = stripNodeMap.get(r.no); if (pil) pil.hidden = gizli;
  }
}

/* ---------------- ana render ---------------- */
function render(d){
  lastData = d;
  cizBaslik(d.sistem);
  cizUyari(d);
  cizKpi(d);
  cizSistemDetay(d.sistem);
  cizFiltreler(d);

  const sirali = siralamaYonu === 'artan' ? d.siparisler.slice().reverse() : d.siparisler;

  reconcile(document.getElementById('yigin'), sirali, r=>r.no, siparisImza, kartOlustur, kartNodeMap, (node,o)=>{
    node.innerHTML = kartIcerikHtml(o);
    const {tamam,toplam} = kartTamamToplam(o);
    node.className = kartSinifi(o, toplam, tamam);
  });
  reconcile(document.getElementById('hizliGit'), sirali, r=>r.no, stripImza, stripPilOlustur, stripNodeMap, (node,o)=>{
    node.className = stripPilSinif(o);
    node.title = stripPilBaslik(o);
  });

  gorunurlukUygula(sirali);
  yiginYerlesim();

  const gorunur = sirali.filter(gecer);
  document.getElementById('yiginBos').hidden = gorunur.length > 0;
  /* arama tek sonuca inince o sekmeye kaydır */
  if (arama.trim() && gorunur.length === 1) sekmeyeGit(gorunur[0].no);
  document.getElementById('guncellendi').textContent = 'Güncellendi ' + zamanStr(d.zaman);
}

async function yenile(){
  try{
    const d = await veriCek('/api/durum');
    siparisMerge(d);
    baglantiDurumu(true);
    render(d);
  }catch(e){ baglantiDurumu(false); }
}

/* ---------------- checklist etkileşimi ---------------- */
async function parcaDegistir(no, parca, checked){
  const anahtar = no+'|'+parca;
  ucusta.add(anahtar);
  const veri = checklistMap[no] || (checklistMap[no] = {});
  const onceki = veri[parca] || null;
  veri[parca] = checked ? new Date().toISOString() : null;
  if (lastData) render(lastData);
  try{
    const yanit = await veriCek('/api/checklist', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({siparis:no, parca:parca, durum:checked}),
    });
    checklistMap[no] = yanit.checklist;
  }catch(e){
    veri[parca] = onceki;
    goster('Kaydedilemedi: '+e.message);
  }finally{
    ucusta.delete(anahtar);
    if (lastData) render(lastData);
  }
}
function kartTumunuIsaretle(no){
  const veri = checklistMap[no] || {};
  Object.keys(veri).filter(k => !veri[k]).forEach(k => parcaDegistir(no, k, true));
}

/* ---------------- olay bağlama ---------------- */
document.addEventListener('change', (e) => {
  const kutu = e.target.closest('input[type=checkbox][data-parca]');
  if (!kutu) return;
  parcaDegistir(kutu.dataset.no, kutu.dataset.parca, kutu.checked);
});
document.getElementById('yigin').addEventListener('click', (e) => {
  const serit = e.target.closest('.yigin-serit');
  if (serit){ sekmeyeGit(serit.dataset.gitSekme); return; }
  const btn = e.target.closest('.kart-tumunu');
  if (btn) kartTumunuIsaretle(btn.dataset.no);
});
/* şeritlerin üzerinde dikey tekerlek → yatay kaydırma (panel içi dikey kalır) */
document.getElementById('yigin').addEventListener('wheel', (e) => {
  if (e.target.closest('.yigin-panel')) return;
  if (Math.abs(e.deltaY) > Math.abs(e.deltaX)){
    e.currentTarget.scrollLeft += e.deltaY;
    e.preventDefault();
  }
}, {passive:false});
document.getElementById('hizliGit').addEventListener('click', (e) => {
  const pil = e.target.closest('[data-git]');
  if (pil) sekmeyeGit(pil.dataset.git);
});
let yiginKaydirBekliyor = false;
document.getElementById('yigin').addEventListener('scroll', () => {
  if (yiginKaydirBekliyor) return;
  yiginKaydirBekliyor = true;
  requestAnimationFrame(() => { yiginKaydirBekliyor = false; yiginKaydir(); });
});
window.addEventListener('resize', () => yiginYerlesim());
document.getElementById('filtreBar').addEventListener('click', (e) => {
  const b = e.target.closest('.chip');
  if (!b) return;
  filtre = b.dataset.filtre;
  if (lastData) render(lastData);
});
document.getElementById('aramaKutu').addEventListener('input', (e) => {
  arama = e.target.value;
  if (lastData) render(lastData);
});
document.getElementById('yonBtn').addEventListener('click', () => {
  siralamaYonu = siralamaYonu === 'artan' ? 'azalan' : 'artan';
  document.getElementById('yonBtn').textContent = siralamaYonu==='artan' ? '↑ No' : '↓ No';
  if (lastData) render(lastData);
});
document.getElementById('temaBtn').addEventListener('click', () => {
  temaPanelAc(document.getElementById('temaPanel').hidden);
});
document.getElementById('temaPanel').addEventListener('click', (e) => {
  const b = e.target.closest('.tema-sec');
  if (b){ temaUygula(b.dataset.tema); temaPanelAc(false); }
});
document.addEventListener('click', (e) => {
  if (!e.target.closest('#temaKutu')) temaPanelAc(false);
});
document.addEventListener('keydown', (e) => {
  const aktifTag = (document.activeElement && document.activeElement.tagName) || '';
  if (e.key === '/' && !e.ctrlKey && !e.metaKey && aktifTag !== 'INPUT' && aktifTag !== 'TEXTAREA'){
    e.preventDefault();
    document.getElementById('aramaKutu').focus();
  } else if (e.key === 'Escape'){
    temaPanelAc(false);
    const kutu = document.getElementById('aramaKutu');
    if (document.activeElement === kutu && kutu.value){
      kutu.value = ''; arama = '';
      if (lastData) render(lastData);
    }
  }
});
document.getElementById('yenileBtn').addEventListener('click', () => yenile());
document.addEventListener('visibilitychange', () => { if (!document.hidden) yenile(); });

document.getElementById('altbilgi').textContent = 'kit-sistemi · ' + location.host;

temaBaslat();
setInterval(yenile, 30000);
yenile();
</script>
