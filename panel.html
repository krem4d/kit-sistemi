<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<meta name="robots" content="noindex">
<title>Adaptx Panel</title>
<style>
:root{
  --page:#f9f9f7;
  --surface:#fcfcfb;
  --ink:#0b0b0b;
  --ink-2:#52514e;
  --muted:#898781;
  --line:#e1e0d9;
  --border:rgba(11,11,11,.10);
  --accent:#2a78d6;
  --accent-100:#cde2fb;
  --good:#0ca30c;
  --warning:#fab219;
  --serious:#ec835a;
  --critical:#d03b3b;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--page);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{margin:0;}
.wrap{max-width:1100px;margin:0 auto;padding:20px 20px 60px;}
.muted{color:var(--muted);}
.num{font-variant-numeric:tabular-nums;}

/* ---- başlık ---- */
header{position:sticky;top:0;z-index:10;background:var(--surface);border-bottom:1px solid var(--line);}
.header-inner{max-width:1100px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.header-inner h1{font-size:18px;font-weight:700;}
.header-sag{margin-left:auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:13px;color:var(--ink-2);}

.pil{display:inline-flex;align-items:center;padding:5px 12px;border-radius:999px;font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--page);color:var(--ink);}
.pil-good{background:rgba(12,163,12,.12);}
.pil-warning{background:rgba(250,178,25,.18);}
.pil-critical{background:rgba(208,59,59,.12);}
.pil-accent{background:rgba(42,120,214,.12);}
.pil-nabiz{animation:nabiz 1.4s ease-in-out infinite;}
@keyframes nabiz{0%,100%{opacity:1}50%{opacity:.55}}
@media (prefers-reduced-motion: reduce){.pil-nabiz{animation:none;}}

#baglantiPil{padding:4px 10px;border-radius:999px;background:rgba(208,59,59,.12);color:var(--ink);font-size:12px;font-weight:600;}

.btn{display:inline-block;padding:8px 14px;border-radius:8px;background:var(--accent);color:#fff;text-decoration:none;font-size:14px;font-weight:600;border:1px solid transparent;cursor:pointer;}
.btn.ghost{background:transparent;color:var(--ink);border-color:var(--border);}
.btn.sm{padding:5px 10px;font-size:12px;font-weight:500;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}

/* ---- uyarı şeridi ---- */
.banner{margin-top:16px;padding:12px 16px;border-radius:10px;background:rgba(236,131,90,.12);border:1px solid rgba(236,131,90,.4);font-size:13px;color:var(--ink);}
.banner > div + div{margin-top:4px;}

/* ---- kpi kartları ---- */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:16px;}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.tile-etiket{font-size:12px;color:var(--muted);margin-bottom:6px;}
.tile-deger{font-size:28px;font-weight:600;line-height:1.15;}
.tile-alt{font-size:12px;color:var(--muted);margin-top:6px;}

.meter{margin-top:10px;}
.meter-track{height:8px;border-radius:999px;background:var(--accent-100);overflow:hidden;}
.meter-track.meter-warning{background:rgba(250,178,25,.18);}
.meter-track.meter-critical{background:rgba(208,59,59,.18);}
.meter-fill{height:100%;border-radius:999px;background:var(--accent);}
.meter-fill.meter-warning{background:var(--warning);}
.meter-fill.meter-critical{background:var(--critical);}

/* ---- sistem detayı ---- */
.sys-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-top:16px;padding:4px 16px;}
.sys-card summary{cursor:pointer;padding:12px 0;font-weight:600;font-size:14px;list-style:none;}
.sys-card summary::-webkit-details-marker{display:none;}
.sys-card summary::before{content:'▸ ';color:var(--muted);}
.sys-card[open] summary::before{content:'▾ ';}
.sys-detay{padding:4px 0 16px;}
.sys-satir{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px;}
.sys-detay h4{font-size:12px;text-transform:uppercase;color:var(--muted);margin:16px 0 8px;letter-spacing:.03em;}
.log-kutu{background:var(--page);border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;white-space:pre-wrap;word-break:break-word;max-height:180px;overflow:auto;color:var(--ink-2);}
.ozet-linkler{display:flex;flex-wrap:wrap;gap:6px;}

/* ---- araç çubuğu ---- */
.toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin:20px 0 12px;}
.arama{flex:1;min-width:180px;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-size:14px;color:var(--ink);}
.chips{display:flex;gap:8px;flex-wrap:wrap;}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:13px;color:var(--ink-2);cursor:pointer;}
.chip-aktif{background:rgba(42,120,214,.12);border-color:var(--accent);color:var(--ink);font-weight:600;}
.chip-sayi{color:var(--muted);font-variant-numeric:tabular-nums;}
.chip-aktif .chip-sayi{color:var(--accent);}

/* ---- rozet (durum) ---- */
.badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;border:1px solid var(--border);font-size:13px;color:var(--ink);background:var(--surface);white-space:nowrap;}
.badge .dot{width:8px;height:8px;border-radius:50%;flex:none;}
.badge-good{background:rgba(12,163,12,.12);} .badge-good .dot{background:var(--good);}
.badge-warning{background:rgba(250,178,25,.18);} .badge-warning .dot{background:var(--warning);}
.badge-serious{background:rgba(236,131,90,.18);} .badge-serious .dot{background:var(--serious);}
.badge-critical{background:rgba(208,59,59,.12);} .badge-critical .dot{background:var(--critical);}

/* ---- checklist özeti (satır içi) ---- */
.chk-ozet{display:inline-flex;align-items:center;gap:8px;}
.nokta-grup{display:inline-flex;gap:3px;}
.nokta{width:8px;height:8px;border-radius:50%;background:var(--line);display:inline-block;}
.nokta-dolu{background:var(--good);}

/* ---- tablo ---- */
table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
thead th{text-align:left;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;padding:10px 14px;border-bottom:1px solid var(--line);font-weight:600;}
tbody td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle;}
tbody tr.satir{cursor:pointer;}
tbody tr.satir:hover{background:var(--page);}
tbody tr.satir:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;}
tbody tr:last-child td{border-bottom:none;}
tbody tr.bos td{text-align:center;color:var(--muted);padding:32px;}
.detay-satir td{padding:0;border-bottom:1px solid var(--line);background:var(--page);}
.pdf-link{color:var(--accent);text-decoration:none;font-weight:600;}
.pdf-link:hover{text-decoration:underline;}

@media (max-width:680px){
  thead{display:none;}
  table, tbody, tr, td{display:block;width:100%;}
  tbody tr.satir{border:1px solid var(--line);border-radius:10px;margin:10px;padding:4px 0;}
  tbody td{display:flex;justify-content:space-between;gap:12px;border-bottom:none;padding:6px 14px;}
  tbody td[data-label]::before{content:attr(data-label);color:var(--muted);font-size:12px;}
  .detay-satir{margin:0 10px 10px;}
  .detay-satir td{border:1px solid var(--line);border-radius:10px;display:block;}
}

/* ---- genişletilmiş sipariş detayı ---- */
.detay-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:24px;padding:18px;}
@media (max-width:720px){.detay-grid{grid-template-columns:1fr;}}
.detay-sol h4, .detay-sag h4{font-size:12px;text-transform:uppercase;color:var(--muted);margin:0 0 8px;letter-spacing:.03em;}
.adet-tablo{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:4px 12px;}
.adet-satir{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);font-size:14px;}
.adet-satir:last-child{border-bottom:none;}
.fbx-liste{list-style:none;margin:0 0 16px;padding:0;font-size:13px;}
.fbx-liste li{padding:4px 0;border-bottom:1px solid var(--line);}
.fbx-liste li:last-child{border-bottom:none;}

.checklist{display:flex;flex-direction:column;gap:2px;}
.chk-satir{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;font-size:14px;}
.chk-satir input[type=checkbox]{width:22px;height:22px;accent-color:var(--accent);cursor:pointer;flex:none;}
.chk-zaman{margin-left:auto;font-size:12px;white-space:nowrap;}

footer.altbilgi{text-align:center;color:var(--muted);font-size:12px;padding:24px 0 40px;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:8px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:50;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>Adaptx Panel</h1>
    <span id="durumPil" class="pil">Yükleniyor…</span>
    <div class="header-sag">
      <span id="baglantiPil" hidden></span>
      <span id="guncellendi">—</span>
      <button id="yenileBtn" class="btn ghost sm" type="button">Yenile</button>
    </div>
  </div>
</header>

<main class="wrap">
  <div id="uyariKutu" class="banner" hidden></div>

  <section id="kpiGrid" class="kpi-grid"></section>

  <details class="sys-card">
    <summary>Sistem detayı</summary>
    <div id="sysDetay" class="sys-detay"></div>
  </details>

  <div class="toolbar">
    <input id="aramaKutu" class="arama" type="search" placeholder="Sipariş no ara…">
    <div id="filtreBar" class="chips"></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Sipariş No</th><th>Durum</th><th>Parça</th><th>Checklist</th><th>PDF</th>
      </tr>
    </thead>
    <tbody id="govdeTablo"><tr><td colspan="5">Yükleniyor…</td></tr></tbody>
  </table>
</main>

<footer class="altbilgi"><span id="altbilgi"></span></footer>
<div id="toast" class="toast"></div>

<script>
'use strict';

/* pdf_uret.py ile birebir aynı satır sırası ve gram eşlemesi (özet PDF'lerle tutarlı) */
const ROWS = [
  ["Frenli Menteşe","Frenli Menteşe"],
  ["Frensiz Menteşe","Frensiz Menteşe"],
  ["Menteşe Tabanı","Menteşe Tabanı"],
  ["Modül Bağlantı","Modülleri Birbirine Bağlama"],
  ["Raf Pimi","Raf Pimi"],
  ["Linco Gövde","Linco Gövde"],
  ["Linco Kapak","Linco Kapak"],
  ["Linco Dübel","Linco Dübel"],
  ["Minifix","Minifix"],
  ["Uzun Linco Pimi","Uzun Linco Pimi"],
  ["Ayarlı Ayak","Ayarlı Ayak"],
  ["Allen","Allen"],
  ["Tıpa","Tıpa"],
  ["Kulp","Kulp"],
  ["Kulp Vidası","Kulp Vidası"],
  ["L Bağlantı Seti","L Bağlantı Seti"],
  ["Askılık Flanşı","Askılık Flanşı"],
  ["Askılık Borusu","Askılık Borusu"],
  ["Ağaç Vidası","Ağaç Vidası"],
  ["Arkalık Çivisi","Arkalık Çivisi"],
];
const RAY_INSERT_AFTER = "L Bağlantı Seti";
const GRAM_KEY = {
  "Raf Pimi":"Raf Pimi", "Ağaç Vidası":"Ağaç Vidası", "Minifix":"Minifix",
  "Linco Dübel":"Linco Dübel", "Linco Gövde":"Linco", "Linco Kapak":"Linco Kapak",
  "Arkalık Çivisi":"Çivi",
};
const DURUM_META = {
  islendi:{sinif:'good', etiket:'İşlendi'},
  bekliyor:{sinif:'warning', etiket:'Bekliyor'},
  isleniyor:{sinif:'warning', etiket:'İşleniyor'},
  hatali:{sinif:'critical', etiket:'Hatalı'},
};

let ADIMLAR = [];
let lastData = null;
let filtre = 'tumu';
let arama = '';
const acikSira = new Set();
const dokunulan = new Set();
const checklistMap = {};
const detayCache = {};
const ucusta = new Set();

function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtSayi(v){
  if (v===null || v===undefined) return '';
  if (typeof v === 'number' && v === 0) return '';
  if (typeof v === 'number' && Number.isInteger(v)) return String(v);
  if (typeof v === 'number') return String(v).replace('.',',');
  return String(v);
}
function hucreDeger(adet, gram, key){
  const s = fmtSayi(adet[key]);
  if (s === '') return '';
  if (GRAM_KEY[key]){
    const g = gram[GRAM_KEY[key]];
    if (g !== null && g !== undefined) return s + ' / ' + fmtSayi(g);
  }
  return s;
}
function zamanStr(epoch){
  if (!epoch) return '—';
  return new Date(epoch*1000).toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function isoStr(iso){
  if (!iso) return '';
  return new Date(iso).toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function sonrakiTurStr(epoch){
  const simdi = Date.now()/1000;
  const farkDk = Math.round((epoch-simdi)/60);
  const saat = new Date(epoch*1000).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  if (farkDk <= 0) return 'Sonraki tur: şimdi ('+saat+')';
  return 'Sonraki tur: '+saat+' ('+farkDk+' dk)';
}

let toastTimer = null;
function goster(mesaj){
  const el = document.getElementById('toast');
  el.textContent = mesaj;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 3000);
}

async function veriCek(url, secenek){
  const r = await fetch(url, secenek);
  if (!r.ok){
    const j = await r.json().catch(()=>({}));
    throw new Error(j.hata || ('HTTP '+r.status));
  }
  return r.json();
}

function baglantiDurumu(bagli){
  const pil = document.getElementById('baglantiPil');
  if (bagli){ pil.hidden = true; }
  else { pil.textContent = 'Bağlantı yok — son veri gösteriliyor'; pil.hidden = false; }
}

async function yenile(){
  try{
    const d = await veriCek('/api/durum');
    lastData = d;
    ADIMLAR = d.adimlar;
    baglantiDurumu(true);
    ciz(d);
  }catch(e){
    baglantiDurumu(false);
  }
}

function ciz(d){
  cizBaslik(d.sistem);
  cizUyari(d);
  cizKpi(d);
  cizSistemDetay(d.sistem);
  cizFiltreler(d);
  cizTablo(d);
  document.getElementById('guncellendi').textContent = 'Güncellendi ' + zamanStr(d.zaman);
}

function cizBaslik(sistem){
  const pil = document.getElementById('durumPil');
  if (sistem.servis_calisiyor){
    pil.className = 'pil pil-accent pil-nabiz';
    pil.textContent = 'Tur çalışıyor…';
  } else if (!sistem.timer_aktif){
    pil.className = 'pil pil-critical';
    pil.textContent = 'Timer kapalı';
  } else if (sistem.sonraki_tur){
    pil.className = 'pil pil-good';
    pil.textContent = sonrakiTurStr(sistem.sonraki_tur);
  } else {
    pil.className = 'pil';
    pil.textContent = 'Durum bilinmiyor';
  }
}

function cizUyari(d){
  const kutu = document.getElementById('uyariKutu');
  const sistem = d.sistem;
  const parcalar = [];
  if (sistem.no_suz_fbx && sistem.no_suz_fbx.length){
    parcalar.push(sistem.no_suz_fbx.length + ' FBX dosyasında sipariş no okunamadı: ' + sistem.no_suz_fbx.map(esc).join(', '));
  }
  if (d.sayac.hatali > 0){
    parcalar.push(d.sayac.hatali + ' sipariş hatalı durumda (boş/bozuk JSON) — “Hatalı” filtresinden bakın.');
  }
  if (sistem.uyarilar && sistem.uyarilar.length){
    sistem.uyarilar.forEach(u => parcalar.push(esc(u)));
  }
  if (parcalar.length === 0){ kutu.hidden = true; return; }
  kutu.hidden = false;
  kutu.innerHTML = parcalar.map(p => '<div>⚠ '+p+'</div>').join('');
}

function diskTileHtml(disk){
  if (!disk){
    return '<div class="tile"><div class="tile-etiket">Disk kullanımı</div><div class="tile-deger muted">Bilinmiyor</div></div>';
  }
  const yuzde = disk.yuzde;
  const sinif = yuzde>=90 ? 'critical' : (yuzde>=80 ? 'warning' : 'accent');
  const bosGb = (disk.bos/1e9).toFixed(1).replace('.',',');
  const topGb = (disk.toplam/1e9).toFixed(1).replace('.',',');
  return '<div class="tile">'
    + '<div class="tile-etiket">Disk kullanımı</div>'
    + '<div class="tile-deger">%'+yuzde+'</div>'
    + '<div class="meter"><div class="meter-track meter-'+sinif+'"><div class="meter-fill meter-'+sinif+'" style="width:'+yuzde+'%"></div></div></div>'
    + '<div class="tile-alt">'+bosGb+' GB boş / '+topGb+' GB</div>'
    + '</div>';
}

function cizKpi(d){
  const s = d.sayac;
  const tiles = [
    ['Toplam sipariş', s.toplam],
    ['İşlendi', s.islendi],
    ['Bekleyen', s.bekleyen + s.isleniyor],
    ['Hatalı', s.hatali],
    ['Teslim edilen', s.tamamlanan + ' / ' + s.toplam],
  ];
  const html = tiles.map(([etiket,deger]) =>
    '<div class="tile"><div class="tile-etiket">'+etiket+'</div><div class="tile-deger">'+deger+'</div></div>'
  ).join('') + diskTileHtml(d.sistem.disk);
  document.getElementById('kpiGrid').innerHTML = html;
}

function cizSistemDetay(sistem){
  const el = document.getElementById('sysDetay');
  const loglar = (sistem.son_loglar||[]).map(esc).join('\n') || 'Kayıt yok.';
  const sonTur = sistem.son_tur || {};
  const sonTurEtiket = {tamamlandi:'Tamamlandı', hata:'Hata', atlandi:'Yeni sipariş yok', bilinmiyor:'Bilinmiyor'}[sonTur.sonuc] || esc(sonTur.sonuc || 'Bilinmiyor');
  const rclone = sistem.rclone || {};
  const ozetAdet = sistem.ozet_adet || 0;
  const ozetLinkler = Array.from({length: ozetAdet}, (_,i)=>i+1)
    .map(n => '<a class="btn ghost sm" href="/pdf/ozet/'+n+'" target="_blank" rel="noopener">'+n+'</a>').join('');
  el.innerHTML =
    '<div class="sys-satir"><span>Son tur</span><span>'+sonTurEtiket+' — '+zamanStr(sonTur.zaman)+'</span></div>'
    + '<div class="sys-satir"><span>rclone son hata</span><span>'+(rclone.son_satir ? esc(rclone.son_satir)+' — '+zamanStr(rclone.err_mtime) : 'Yok')+'</span></div>'
    + '<div class="sys-satir"><span>Son inen FBX</span><span>'+(sistem.son_fbx ? esc(sistem.son_fbx.ad)+' — '+zamanStr(sistem.son_fbx.zaman) : '—')+'</span></div>'
    + '<div class="sys-satir"><span>Sistem yükü</span><span>'+(sistem.yuk ?? '—')+'</span></div>'
    + '<h4>Son günlük satırları</h4><pre class="log-kutu">'+loglar+'</pre>'
    + '<h4>Özet PDF\'ler ('+ozetAdet+')</h4><div class="ozet-linkler">'+(ozetLinkler || '<span class="muted">Henüz yok</span>')+'</div>';
}

function rowChecklist(r){
  if (dokunulan.has(r.no)) return ADIMLAR.map(a => !!(checklistMap[r.no] && checklistMap[r.no][a]));
  return r.checklist;
}
function rowTamam(r){
  return rowChecklist(r).filter(Boolean).length;
}
function filtreSayilar(d){
  const s = d.sayac;
  const eksik = d.siparisler.filter(r => rowTamam(r) < ADIMLAR.length).length;
  const tamam = d.siparisler.filter(r => rowTamam(r) === ADIMLAR.length && ADIMLAR.length > 0).length;
  return { tumu:s.toplam, bekleyen:s.bekleyen+s.isleniyor, hatali:s.hatali, eksik, tamam };
}

function cizFiltreler(d){
  const sayilar = filtreSayilar(d);
  const tanim = [
    ['tumu','Tümü',sayilar.tumu],
    ['bekleyen','Bekleyen',sayilar.bekleyen],
    ['hatali','Hatalı',sayilar.hatali],
    ['eksik','Eksik checklist',sayilar.eksik],
    ['tamam','Teslim edilen',sayilar.tamam],
  ];
  document.getElementById('filtreBar').innerHTML = tanim.map(([key,etiket,sayi]) =>
    '<button class="chip '+(filtre===key?'chip-aktif':'')+'" data-filtre="'+key+'" type="button">'+etiket+' <span class="chip-sayi">'+sayi+'</span></button>'
  ).join('');
}

function gecer(r){
  if (arama){
    const q = arama.trim().toLocaleLowerCase('tr-TR');
    if (!r.no.toLowerCase().includes(q)) return false;
  }
  if (filtre==='bekleyen') return r.durum==='bekliyor' || r.durum==='isleniyor';
  if (filtre==='hatali') return r.durum==='hatali';
  if (filtre==='eksik') return rowTamam(r) < ADIMLAR.length;
  if (filtre==='tamam') return rowTamam(r) === ADIMLAR.length && ADIMLAR.length > 0;
  return true;
}

function rozetHtml(durum){
  const m = DURUM_META[durum] || {sinif:'', etiket:durum};
  return '<span class="badge badge-'+m.sinif+'"><span class="dot"></span>'+esc(m.etiket)+'</span>';
}
function checklistOzetHtml(r){
  const durumlar = rowChecklist(r);
  const tamam = durumlar.filter(Boolean).length;
  const noktalar = durumlar.map(ok => '<span class="nokta '+(ok?'nokta-dolu':'')+'"></span>').join('');
  const ipucu = ADIMLAR.map((a,i) => (durumlar[i]?'✓ ':'○ ')+a).join('\n');
  return '<span class="chk-ozet"><span class="num">'+tamam+'/'+ADIMLAR.length+'</span>'
    + '<span class="nokta-grup" title="'+esc(ipucu)+'">'+noktalar+'</span></span>';
}

function satirHtml(r){
  const no = esc(r.no);
  const pdfHucre = r.pdf
    ? '<a class="pdf-link" href="/pdf/siparis/'+encodeURIComponent(r.no)+'" target="_blank" rel="noopener">PDF</a>'
    : '<span class="muted">—</span>';
  return '<tr class="satir" data-no="'+no+'" tabindex="0" role="button" aria-expanded="'+(acikSira.has(r.no)?'true':'false')+'">'
    + '<td data-label="Sipariş No"><strong>'+no+'</strong></td>'
    + '<td data-label="Durum">'+rozetHtml(r.durum)+'</td>'
    + '<td data-label="Parça" class="num">'+(r.parca ?? '—')+'</td>'
    + '<td data-label="Checklist">'+checklistOzetHtml(r)+'</td>'
    + '<td data-label="PDF">'+pdfHucre+'</td>'
    + '</tr>'
    + '<tr class="detay-satir" id="detay-satir-'+no+'" '+(acikSira.has(r.no)?'':'hidden')+'>'
    + '<td colspan="5"><div class="detay" id="detay-'+no+'">Yükleniyor…</div></td></tr>';
}

function cizTablo(d){
  const tbody = document.getElementById('govdeTablo');
  const satirlar = d.siparisler.filter(gecer);
  if (satirlar.length === 0){
    tbody.innerHTML = '<tr class="bos"><td colspan="5">Sonuç bulunamadı.</td></tr>';
    return;
  }
  tbody.innerHTML = satirlar.map(satirHtml).join('');
  satirlar.forEach(r => { if (acikSira.has(r.no)) detayDoldur(r.no); });
}

function fbxListHtml(fbxListesi){
  if (!fbxListesi || !fbxListesi.length) return '<li class="muted">Kaynak bulunamadı</li>';
  return fbxListesi.map(f => '<li>'+esc(f.ad)+' <span class="muted">('+zamanStr(f.zaman)+')</span></li>').join('');
}
function checklistFormHtml(no){
  return ADIMLAR.map((adim,i) => {
    const zaman = checklistMap[no] ? checklistMap[no][adim] : null;
    const id = 'chk-'+no+'-'+i;
    return '<label class="chk-satir" for="'+id+'">'
      + '<input type="checkbox" id="'+id+'" '+(zaman?'checked':'')+' data-no="'+esc(no)+'" data-adim="'+esc(adim)+'">'
      + '<span>'+esc(adim)+'</span>'
      + '<span class="muted chk-zaman">'+(zaman ? isoStr(zaman) : '')+'</span>'
      + '</label>';
  }).join('');
}
function rowLine(etiket, deger){
  const gosterim = deger==='' ? '<span class="muted">—</span>' : esc(deger);
  return '<div class="adet-satir"><span>'+esc(etiket)+'</span><span class="num">'+gosterim+'</span></div>';
}

function detayHtml(no, veri){
  const sagOrtak = '<h4>Kaynak FBX</h4><ul class="fbx-liste">'+fbxListHtml(veri.fbx)+'</ul>'
    + '<h4>Checklist</h4><div class="checklist">'+checklistFormHtml(no)+'</div>';

  if (veri.durum !== 'islendi'){
    const mesajlar = {
      bekliyor:'Bu sipariş henüz işlenmedi; bir sonraki turda Blender tarafından sayılacak.',
      isleniyor:'Bu sipariş şu anda işleniyor olabilir (JSON yazım aşamasında). Birazdan tekrar açın.',
      hatali:'Bu siparişin JSON dosyası boş veya bozuk görünüyor. Elle kontrol gerekebilir.',
    };
    const mesaj = mesajlar[veri.durum] || 'Durum bilinmiyor.';
    return '<div class="detay-grid"><div class="detay-sol"><p class="muted">'+esc(mesaj)+'</p></div>'
      + '<div class="detay-sag">'+sagOrtak+'</div></div>';
  }

  const adet = veri.adet || {}, gram = veri.gram || {}, ray = veri.ray_setleri || {};
  const satirlar = ROWS.map(([etiket,anahtar]) => rowLine(etiket, hucreDeger(adet,gram,anahtar)));
  const rayAnahtarlari = Object.keys(ray).filter(k => ray[k]).sort((a,b) => parseInt(b,10)-parseInt(a,10));
  const rayHtml = rayAnahtarlari.map(k => rowLine('Ray Seti '+k, fmtSayi(ray[k])));
  const idx = ROWS.findIndex(([etiket]) => etiket===RAY_INSERT_AFTER);
  satirlar.splice(idx+1, 0, ...rayHtml);

  const pdfBtn = veri.pdf
    ? '<a class="btn" href="/pdf/siparis/'+encodeURIComponent(no)+'" target="_blank" rel="noopener">Sipariş PDF\'i Aç</a>'
    : '<span class="badge badge-serious"><span class="dot"></span>PDF yok</span>';
  const ozetBtn = veri.ozet_no
    ? '<a class="btn ghost" href="/pdf/ozet/'+veri.ozet_no+'" target="_blank" rel="noopener">Özet Sayfa '+veri.ozet_no+'</a>'
    : '';

  return '<div class="detay-grid">'
    + '<div class="detay-sol"><h4>Parça listesi'+(veri.parca_sayisi?' <span class="muted">('+veri.parca_sayisi+' parça)</span>':'')+'</h4>'
    + '<div class="adet-tablo">'+satirlar.join('')+'</div></div>'
    + '<div class="detay-sag"><div class="btn-row">'+pdfBtn+ozetBtn+'</div>'+sagOrtak+'</div>'
    + '</div>';
}

async function detayDoldur(no){
  const kapsayici = document.getElementById('detay-'+no);
  if (!kapsayici) return;
  if (!detayCache[no]){
    try{
      const veri = await veriCek('/api/siparis/'+encodeURIComponent(no));
      detayCache[no] = veri;
      if (!dokunulan.has(no)){
        checklistMap[no] = veri.checklist;
        dokunulan.add(no);
      }
    }catch(e){
      kapsayici.innerHTML = '<p class="muted">Detay yüklenemedi: '+esc(e.message)+'</p>';
      return;
    }
  }
  kapsayici.innerHTML = detayHtml(no, detayCache[no]);
}

function satirAcKapat(no){
  const detaySatir = document.getElementById('detay-satir-'+no);
  if (!detaySatir) return;
  const acik = acikSira.has(no);
  if (acik){ acikSira.delete(no); detaySatir.hidden = true; }
  else { acikSira.add(no); detaySatir.hidden = false; detayDoldur(no); }
  const anaSatir = document.querySelector('.satir[data-no="'+no+'"]');
  if (anaSatir) anaSatir.setAttribute('aria-expanded', String(!acik));
}

async function adimDegistir(no, adim, checked){
  const anahtar = no+'|'+adim;
  ucusta.add(anahtar);
  checklistMap[no] = checklistMap[no] || {};
  const onceki = checklistMap[no][adim] || null;
  checklistMap[no][adim] = checked ? new Date().toISOString() : null;
  dokunulan.add(no);
  if (lastData) ciz(lastData);
  try{
    const yanit = await veriCek('/api/checklist', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({siparis:no, adim:adim, durum:checked}),
    });
    checklistMap[no] = yanit.checklist;
  }catch(e){
    checklistMap[no][adim] = onceki;
    goster('Kaydedilemedi: '+e.message);
  }finally{
    ucusta.delete(anahtar);
    if (lastData) ciz(lastData);
  }
}

document.getElementById('govdeTablo').addEventListener('click', (e) => {
  if (e.target.closest('a')) return;
  const satir = e.target.closest('.satir');
  if (!satir) return;
  satirAcKapat(satir.dataset.no);
});
document.getElementById('govdeTablo').addEventListener('keydown', (e) => {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  const satir = e.target.closest('.satir');
  if (!satir) return;
  e.preventDefault();
  satirAcKapat(satir.dataset.no);
});
document.addEventListener('change', (e) => {
  const kutu = e.target.closest('input[type=checkbox][data-adim]');
  if (!kutu) return;
  adimDegistir(kutu.dataset.no, kutu.dataset.adim, kutu.checked);
});
document.getElementById('filtreBar').addEventListener('click', (e) => {
  const b = e.target.closest('.chip');
  if (!b) return;
  filtre = b.dataset.filtre;
  if (lastData) ciz(lastData);
});
document.getElementById('aramaKutu').addEventListener('input', (e) => {
  arama = e.target.value;
  if (lastData) ciz(lastData);
});
document.getElementById('yenileBtn').addEventListener('click', () => yenile());
document.addEventListener('visibilitychange', () => { if (!document.hidden) yenile(); });

document.getElementById('altbilgi').textContent = 'kit-sistemi · ' + location.host;

setInterval(yenile, 30000);
yenile();
</script>
